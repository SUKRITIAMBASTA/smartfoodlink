<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for SmartFoodLink as a food donor or NGO.">
    <title>Register — SmartFoodLink</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card glass-card">
            <a href="index.html" class="navbar-brand" style="justify-content:center;margin-bottom:1.5rem;">🍃
                Smart<span>FoodLink</span></a>
            <h1 class="text-center">Create Account</h1>
            <p class="subtitle text-center">Join the food redistribution movement</p>

            <div id="alert-box" class="alert"></div>

            <!-- Role Selector -->
            <div class="role-selector" id="role-selector">
                <div class="role-option active" data-role="donor" onclick="selectRole('donor')">
                    🍽️ Donor
                </div>
                <div class="role-option" data-role="ngo" onclick="selectRole('ngo')">
                    🤝 NGO / Recipient
                </div>
            </div>

            <form id="register-form">
                <input type="hidden" id="role" value="donor">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+91 98765 43210">
                    </div>
                    <div class="form-group" id="org-group" style="display:none;">
                        <label for="organization">Organization Name</label>
                        <input type="text" id="organization" class="form-control" placeholder="NGO name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" class="form-control" placeholder="Street address, city">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters"
                        required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;"
                    id="register-btn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
