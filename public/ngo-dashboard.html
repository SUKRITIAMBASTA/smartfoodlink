<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Dashboard — SmartFoodLink</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">🍃 Smart<span>FoodLink</span></div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" data-section="browse">🔍 Browse Food</a>
                <a href="#" class="sidebar-link" data-section="claimed">📋 My Claims</a>
                <a href="map.html" class="sidebar-link">🗺️ Live Map</a>
            </nav>
            <div class="sidebar-footer">
                <div style="font-size:.85rem;color:var(--clr-text-muted);margin-bottom:.5rem;" id="user-name">NGO</div>
                <button class="btn btn-outline btn-sm" onclick="logout()"
                    style="width:100%;justify-content:center;">Logout</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <button class="navbar-toggle" id="sidebar-toggle" style="margin-bottom:1rem;">☰</button>

            <!-- Browse Food Section -->
            <div id="section-browse">
                <div class="page-header">
                    <div>
                        <h1>Available Food 🍲</h1>
                        <p>Browse and claim surplus food near you</p>
                    </div>
                    <button class="btn btn-outline" onclick="loadAvailableFood()">🔄 Refresh</button>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon green">🍽️</div>
                        <h3 id="available-count">0</h3>
                        <p>Available Now</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">✅</div>
                        <h3 id="my-claimed-count">0</h3>
                        <p>My Claims</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">🚚</div>
                        <h3 id="picked-up-count">0</h3>
                        <p>Picked Up</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">💚</div>
                        <h3 id="delivered-count">0</h3>
                        <p>Delivered</p>
                    </div>
                </div>

                <div id="available-food-grid" class="food-grid">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- My Claims Section -->
            <div id="section-claimed" style="display:none;">
                <div class="page-header">
                    <div>
                        <h1>My Claimed Food</h1>
                        <p>Track and manage your claims</p>
                    </div>
                </div>
                <div id="claimed-food-grid" class="food-grid">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/ngo.js"></script>
</body>

</html>
