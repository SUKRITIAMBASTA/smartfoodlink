<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Food Map — SmartFoodLink</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <div class="map-page">
        <!-- Toolbar -->
        <div class="map-toolbar">
            <div class="left">
                <a href="index.html" class="navbar-brand">🍃 Smart<span>FoodLink</span></a>
                <span style="color:var(--clr-text-muted);font-size:.9rem;" id="map-status">Loading map...</span>
            </div>
            <div style="display:flex;gap:.5rem;">
                <button class="btn btn-primary btn-sm" onclick="findNearMe()" id="locate-btn">📍 Near Me</button>
                <button class="btn btn-outline btn-sm" onclick="loadMapListings()">🔄 Refresh</button>
                <a href="index.html" class="btn btn-outline btn-sm">← Home</a>
            </div>
        </div>

        <!-- Map -->
        <div id="map-container"></div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/map.js"></script>
</body>

</html>
