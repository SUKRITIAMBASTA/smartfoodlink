<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your SmartFoodLink account.">
    <title>Login — SmartFoodLink</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card glass-card">
            <a href="index.html" class="navbar-brand" style="justify-content:center;margin-bottom:1.5rem;">🍃
                Smart<span>FoodLink</span></a>
            <h1 class="text-center">Welcome Back</h1>
            <p class="subtitle text-center">Log in to manage your donations or claims</p>

            <div id="alert-box" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;"
                    id="login-btn">
                    Log In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up free</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
